<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loyihamiz: Card Design</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>

    <div class="container">
        
        <div class="card card-purple">
            <div class="icon-wrapper purple-gradient">
                <img src="box-icon.svg" alt="Box icon" class="icon"> 
            </div>
            <h2 class="card-title">Doimiy Support</h2>
            <p class="card-text">Savolingiz bo'lsa yopiq communitydan yoki shaxsan o'zimdan javob olsangiz bo'ladi.</p>
        </div>

        <div class="card card-orange">
            <div class="icon-wrapper orange-gradient">
                <img src="star-icon.svg" alt="Star icon" class="icon">
            </div>
            <h2 class="card-title">100+ loyihadagi tajriba</h2>
            <p class="card-text">Logistika, ta’lim, qurilish, tibbiyot — dars rejalar 100+ loyihalarim tajribasi asosida tuzganman.</p>
        </div>

    </div>

</body>
</html>
